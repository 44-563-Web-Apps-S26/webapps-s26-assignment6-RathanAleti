<!DOCTYPE html>
<html>
<head>
  <title>Villains by Rathan Aleti</title>
</head>

<body>

<h1>Villains by Rathan Aleti</h1>

<form>
  <label>Funny Man:</label>
  <input type="password" id="secret" value="Joker">
  <br><br>

  <label>Guess the villain:</label>
  <input type="text" id="guess">
  <br><br>

  <button type="button" onclick="checkVillain()">Check the guess</button>
</form>

<p id="output"></p>

<!-- Image Section (Part 4) -->
<div>
  <img id="treePic" src="TreeImage01.jpeg" width="150" height="150" onclick="updatePic()">
</div>

<script>

var caught = 0;
var gotAway = 0;
var usePic = 1;

function checkVillain() {

  var secretValue = document.getElementById("secret").value;
  var guessValue = document.getElementById("guess").value;

  if (secretValue === guessValue) {
    caught++;
    alert("You caught them");
  } else {
    gotAway++;
    alert("Maybe next time");
  }

  document.getElementById("output").innerHTML =
    "Caught: " + caught + " | Got Away: " + gotAway;
}

function updatePic() {

  var image = document.getElementById("treePic");

  switch(usePic) {

    case 1:
      image.src = "TreeImage02.jpeg";
      usePic = 2;
      break;

    case 2:
      image.src = "TreeImage03.jpeg";
      usePic = 3;
      break;

    case 3:
      image.src = "TreeImage01.jpeg";
      usePic = 1;
      break;
  }
}

</script>

</body>
</html>
