<!DOCTYPE html>
<html>

<head>
  <title>Rathan Reddy tax table computation</title>
</head>

<body>

<h1>Rathan Reddy tax table computation</h1>

<form>

<label>Enter income</label>
<input type="number" id="income" value="5000"><br><br>

<label>Enter the base tax rate</label>
<input type="number" id="baseRate" value="0.05"><br><br>

<label>Enter the cut off</label>
<input type="number" id="cutoff" value="7500"><br><br>

<label>Enter the extended rate</label>
<input type="number" id="extRate" value="0.15"><br><br>

<button type="button" onclick="doTax()">Show tax table</button>

</form>
<form>
  <input type="radio" name="operation" value="exponent" onclick="chooseOp()"> power
  <input type="radio" name="operation" value="add" onclick="chooseOp()"> sum
  <input type="radio" name="operation" value="mod" onclick="chooseOp()"> mod
</form>

<p id="radioResult"></p>

<p id="taxOutput"></p>

<script>

function doTax() {

  var income = Number(document.getElementById("income").value);
  var cutoff = Number(document.getElementById("cutoff").value);
  var baseRate = Number(document.getElementById("baseRate").value);
  var extRate = Number(document.getElementById("extRate").value);

  var taxTable = "";

  for (var i = 1; i <= 5; i++) {

    var incomeLevel = income * i;
    var tax = 0;

    if (incomeLevel <= cutoff) {
      tax = incomeLevel * baseRate;
    } else {
      tax = (cutoff * baseRate) +
            ((incomeLevel - cutoff) * extRate);
    }

    taxTable += "incomeLevel " + incomeLevel +
                " is " + tax + "; ";
  }

  document.getElementById("taxOutput").innerHTML =
    "Taxes are: " + taxTable;
}


function chooseOp() {

  var income = Number(document.getElementById("income").value);
  var baseRate = Number(document.getElementById("baseRate").value);

  var radios = document.getElementsByName("operation");
  var result;

  for (var i = 0; i < radios.length; i++) {
    if (radios[i].checked) {

      if (radios[i].value === "exponent") {
        result = income ** baseRate;
      }

      if (radios[i].value === "add") {
        result = income + baseRate;
      }

      if (radios[i].value === "mod") {
        result = income % baseRate;
      }
    }
  }

  document.getElementById("radioResult").innerHTML =
    "Result is: " + result;
}
</script>

</body>
</html>
